name: build

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号，例如 v1.0.1'
        required: true
        type: string


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set version in build.gradle.kts
        run: |
          RAW_VERSION="${{ github.event.inputs.version }}"
          VERSION_NAME="${RAW_VERSION#v}"
          VERSION_CODE="${VERSION_NAME//./}"
          echo "VERSION_NAME=$VERSION_NAME"
          echo "VERSION_CODE=$VERSION_CODE"
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts
          grep -E "versionCode|versionName" app/build.gradle.kts
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/shellbox-release.jks
          echo "Keystore decoded, size: $(wc -c < shellbox-release.jks) bytes"

      - name: Build Release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/shellbox-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk \
             artifacts/ShellBox-arm64.apk
          echo "APK size: $(wc -c < artifacts/ShellBox-arm64.apk) bytes"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShellBox-APK
          path: artifacts/ShellBox-*.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ShellBox ${{ github.event.inputs.version }}
          tag_name: ${{ github.event.inputs.version }}
          files: artifacts/ShellBox-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
