name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/shellbox-release.jks
          echo "Keystore decoded, size: $(wc -c < shellbox-release.jks) bytes"

      - name: Build Release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/shellbox-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk \
             artifacts/ShellBox-${{ github.ref_name }}.apk
          echo "APK size: $(wc -c < artifacts/ShellBox-${{ github.ref_name }}.apk) bytes"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShellBox-APK
          path: artifacts/ShellBox-*.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag: test
          tag_name: shellbox test
          files: artifacts/ShellBox-*.apk
          name: ShellBox ${{ github.ref_name }}
          body: |
            ## ShellBox ${{ github.ref_name }}

            ### 安装说明
            1. 下载 `ShellBox-${{ github.ref_name }}.apk`
            2. 在 Android 设备上允许安装未知来源应用
            3. 安装并运行

            ### 更新内容
            请查看 Commits 了解本版本变更。
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
